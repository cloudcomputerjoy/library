</div>

<input class="w-full h-14 bg-surface-container-low border-none rounded-lg px-4 text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" placeholder="e.g. Cognitive Science" type="text" value="Cognitive Science"/>

<script>
        function switchTab(tabId) {
            // Update Tab Buttons
            document.querySelectorAll('[id^="tab-"]').forEach(btn => {
                btn.classList.remove('border-primary', 'text-primary');
                btn.classList.add('border-transparent', 'text-on-surface-variant');
            });
            document.getElementById('tab-' + tabId).classList.add('border-primary', 'text-primary');
            document.getElementById('tab-' + tabId).classList.remove('border-transparent', 'text-on-surface-variant');

            // Update Tab Content
            document.querySelectorAll('[data-tab-content]').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById('content-' + tabId).classList.add('active');
        }
    </script>
