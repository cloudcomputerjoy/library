<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #2563eb, transparent);
            box-shadow: 0 0 15px #2563eb;
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

<body class="bg-black font-body text-on-surface overflow-hidden h-screen w-screen flex flex-col">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 w-full bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-[0_20px_40px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="close-up portrait of a professional man with a friendly expression in soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDa9vq1i7d7DQ-Wb7hQOFQ6X_b5dpT0D6NBe7gGhXbH-rBPpAPCgEjyRkzmrZTFm6TyuMdqY0TyeUQQefeaYU_leEUMRumbp-C6StXyrknm12oNIUxDg70HRcPWrZuFBINMKi4zgiUe514ZgxPiiKFPSDo9WOXOs5Xp77pEJm0oLtyHE5xG1tD6vvYu7A7KqrxEoPz_YjILhrpKskCshN6kLvMmb3QKgkujt5LExnO6bk_da7x0d4geH-u2SIaW9O4Yua3M1CwnDI"/>

<span class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-violet-600 font-['Manrope'] font-semibold tracking-tight">The Atheneum</span>
</div>
<div class="text-blue-600 dark:text-blue-400 hover:opacity-80 transition-opacity">

</div>
</header>
<!-- Main Camera Canvas -->
<main class="relative flex-1 w-full flex items-center justify-center overflow-hidden pt-16 pb-24">
<!-- Mock Camera Feed Background -->
<div class="absolute inset-0 z-0">
<img alt="Library Environment" class="w-full h-full object-cover opacity-60" data-alt="blurred POV of a modern high-tech library with glowing screens and book stacks in the background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgbJvDpJ6egvzFRhdaI5_i25w99tCtCdWz4lKIHue7BskvP7uEWpOgspiCg59j0yW-nozJJH5U828n8NGhhA0aRI1CbSSBQs5dv1-9NYDUOVZrxq-H1bIQOpbq72slMtL3L_4vHFHjp2cT64irl9PykX2Hdd1b9j5nKdBA83TcTQiZzo9r8rSjID9R_s8l0vA1GR5H1-CyyCRhhIayu_vzLTNAiJF2ikEI4a6PKEvr235n-_ZrPml0XIJWR5F_mOBWWPnyYrTNSL0"/>
<div class="absolute inset-0 bg-black/40"></div>
</div>
<!-- Scanning Overlay Interface -->
<div class="relative z-10 flex flex-col items-center justify-center w-full max-w-md px-6">
<div class="text-center mb-8">
<h1 class="font-headline text-2xl font-bold text-white mb-2">Scan Asset</h1>
<p class="text-white/70 text-sm">Align the QR code within the frame to access library resources or campus locations.</p>
</div>
<!-- The Scanning Frame -->
<div class="relative w-72 h-72 md:w-80 md:h-80">
<!-- Corner Borders -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-primary rounded-tl-3xl"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-primary rounded-tr-3xl"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-primary rounded-bl-3xl"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-primary rounded-br-3xl"></div>
<!-- Animated Scan Line -->
<div class="scan-line absolute left-0 right-0 z-20"></div>
<!-- Glassy Frame Content -->
<div class="absolute inset-4 rounded-2xl bg-white/5 backdrop-blur-[2px] border border-white/10 flex items-center justify-center">
<span class="material-symbols-outlined text-white/20 text-6xl select-none" style="font-variation-settings: 'wght' 100">qr_code_2</span>
</div>
</div>
<!-- Contextual Controls (Glassmorphism) -->
<div class="mt-12 flex gap-6">
<button class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-white hover:bg-white/20 transition-all active:scale-95 group">
<span class="material-symbols-outlined group-active:text-primary">flashlight_on</span>
</button>
<button class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-white hover:bg-white/20 transition-all active:scale-95 group">
<span class="material-symbols-outlined group-active:text-primary">image</span>
</button>
<button class="w-14 h-14 rounded-full glass-panel flex items-center justify-center text-white hover:bg-white/20 transition-all active:scale-95 group">
<span class="material-symbols-outlined group-active:text-primary">info</span>
</button>
</div>
</div>
<!-- Success Toast (Example State) -->
<div class="absolute bottom-28 left-1/2 -translate-x-1/2 z-30 w-[90%] max-w-sm">
<div class="bg-white/95 backdrop-blur-xl p-4 rounded-2xl shadow-2xl flex items-center gap-4 transform translate-y-2 opacity-0 pointer-events-none">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container">check_circle</span>
</div>
<div class="flex-1">
<p class="font-headline font-semibold text-sm text-on-surface">Book Recognized</p>
<p class="text-xs text-on-surface-variant">The Great Gatsby (Digital Copy)</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant/40">chevron_right</span>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl z-50 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors scale-90 duration-200 active:scale-110" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Home</span>

<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors scale-90 duration-200 active:scale-110" href="#">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Search</span>
</a>

<span class="material-symbols-outlined" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Scan</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors scale-90 duration-200 active:scale-110" href="#">
<span class="material-symbols-outlined" data-icon="print">print</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Print</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors scale-90 duration-200 active:scale-110" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] font-medium tracking-wide uppercase mt-1">Profile</span>
</a>
</nav>

<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute inset-0 bg-primary/5 opacity-30 animate-pulse"></div>
</div>
