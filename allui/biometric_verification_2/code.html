<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Biometric Verification | The Atheneum</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c3c6d7",
                        "surface-variant": "#e1e3e4",
                        "surface-bright": "#f8f9fa",
                        "on-tertiary-fixed": "#002109",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "on-surface-variant": "#434655",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#d2bbff",
                        "on-tertiary-container": "#c1ffc5",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-secondary": "#ffffff",
                        "secondary": "#712ae2",
                        "tertiary-container": "#007e37",
                        "on-background": "#191c1d",
                        "inverse-surface": "#2e3132",
                        "secondary-container": "#8a4cfc",
                        "on-primary-container": "#eeefff",
                        "surface-container-low": "#f3f4f5",
                        "error-container": "#ffdad6",
                        "surface-tint": "#0053db",
                        "on-primary-fixed": "#00174b",
                        "tertiary-fixed-dim": "#4ae176",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#005321",
                        "tertiary-fixed": "#6bff8f",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e7e8e9",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "outline": "#737686",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed": "#25005a",
                        "tertiary": "#006229",
                        "inverse-primary": "#b4c5ff",
                        "secondary-fixed": "#eaddff",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#003ea8",
                        "primary-fixed": "#dbe1ff",
                        "surface-container": "#edeeef",
                        "primary-container": "#2563eb",
                        "background": "#f8f9fa",
                        "surface": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "on-secondary-container": "#fffbff",
                        "inverse-on-surface": "#f0f1f2",
                        "primary": "#004ac6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "xxl": "1.5rem",
                        "xxxl": "2rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-glow {
            box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(138, 76, 252, 0); }
            100% { box-shadow: 0 0 0 0 rgba(138, 76, 252, 0); }
        }
        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen overflow-hidden flex flex-col">
<!-- Suppressing Shared Nav Shell as this is a focused transactional screen -->
<main class="flex-grow flex flex-col items-center justify-center px-6 relative">
<!-- Background Accents -->
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-gradient-to-br from-primary-container/20 to-secondary-container/20 blur-[100px] -z-10"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] rounded-full bg-gradient-to-tr from-secondary-container/10 to-primary-container/20 blur-[120px] -z-10"></div>
<!-- Verification Container -->
<div class="w-full max-w-md flex flex-col items-center text-center">
<!-- Identity Section -->
<div class="mb-12">
<h1 class="font-headline font-extrabold text-3xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-primary-container to-secondary-container mb-2">
                    The Atheneum
                </h1>
<div class="w-12 h-1 bg-gradient-to-r from-primary-container to-secondary-container mx-auto rounded-full"></div>
</div>
<!-- Biometric Hub -->
<div class="relative mb-16">
<!-- Outer Pulse Rings -->
<div class="absolute inset-0 rounded-full bg-primary-container/5 animate-ping opacity-20"></div>
<!-- Main Scanner Surface -->
<div class="relative w-48 h-48 flex items-center justify-center rounded-full glass-card shadow-[0_20px_40px_rgba(0,0,0,0.04)] pulse-glow group cursor-pointer transition-transform duration-500 hover:scale-105">
<span class="material-symbols-outlined text-[80px] text-primary-container" style="font-variation-settings: 'wght' 300;">
                        fingerprint
                    </span>
<!-- Scanning Overlay Effect -->
<div class="absolute top-0 left-0 w-full h-full rounded-full border-[3px] border-primary-container/20"></div>
<div class="absolute top-0 left-0 w-full h-1/2 rounded-t-full bg-gradient-to-b from-primary-container/10 to-transparent"></div>
</div>
</div>
<!-- Instruction Text -->
<div class="space-y-4 mb-16">
<h2 class="font-headline font-bold text-2xl text-on-surface">Biometric Verification</h2>
<p class="text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                    Scan your fingerprint to continue to your scholarly sanctuary.
                </p>
</div>
<!-- Interactive Actions -->
<div class="w-full space-y-6">
<!-- Processing Badge (Hidden by default, shown during scan) -->
<div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-secondary-fixed/30 border border-outline-variant/15">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<span class="text-xs font-medium text-on-secondary-fixed-variant tracking-wide">WAITING FOR INPUT</span>
</div>
<div class="grid grid-cols-1 gap-4 pt-8">
<button class="w-full h-14 rounded-xxl bg-gradient-to-r from-primary-container to-secondary-container text-on-primary font-semibold shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-xl">security</span>
                        Confirm Identity
                    </button>
<button class="w-full h-14 rounded-xxl bg-surface-container-high text-on-surface font-semibold hover:bg-surface-container-highest active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-xl">keyboard</span>
                        Use Passcode Instead
                    </button>
</div>
</div>
<!-- Security Footer -->
<div class="mt-12 flex items-center gap-2 text-on-surface-variant/60">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-[10px] font-medium tracking-widest uppercase">End-to-End Encrypted Verification</span>
</div>
</div>
</main>
<!-- Close/Back Action (Transactional Override) -->
<div class="fixed top-8 left-8">
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-card text-on-surface-variant hover:text-on-surface hover:bg-surface-container-lowest transition-all shadow-sm">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<!-- Help/Support Floating Action -->
<div class="fixed bottom-12 right-8">
<button class="w-14 h-14 flex items-center justify-center rounded-full bg-white shadow-xl border border-outline-variant/10 text-primary-container hover:scale-110 transition-transform">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</body></html>
