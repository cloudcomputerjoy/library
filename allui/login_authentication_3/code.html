<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[480px] z-10">
<!-- Branding Header -->
<header class="text-center mb-12">
<div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-primary-container to-secondary-container rounded-3xl mb-6 shadow-xl shadow-primary-container/20">
<span class="material-symbols-outlined text-white text-3xl" data-icon="auto_stories">auto_stories</span>
</div>
<h1 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface mb-2">The Atheneum</h1>
<p class="text-on-surface-variant font-body leading-relaxed max-w-[320px] mx-auto">
                Step back into your scholarly sanctuary and explore your digital collection.
            </p>
</header>
<!-- Login Container -->
<section class="glass-card rounded-3xl p-8 shadow-[0_20px_40px_rgba(0,0,0,0.04)] ring-1 ring-white/50">
<form class="space-y-6">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant ml-1" for="email">Academic Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline transition-colors group-focus-within:text-primary" data-icon="mail">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-highest rounded-xxl border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/60" id="email" placeholder="u.name@campus.edu" type="email"/>
</div>
</div>
<!-- Auth Options Toggle (Semantic Visual) -->
<div class="flex items-center justify-between gap-4 py-2">
<button class="flex-1 py-3 px-4 bg-surface-container-high rounded-xxl text-sm font-semibold text-primary flex items-center justify-center gap-2 transition-all hover:bg-surface-container-highest" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="key">key</span>
                        Password
                    </button>
<button class="flex-1 py-3 px-4 bg-surface-container-lowest rounded-xxl text-sm font-semibold text-on-surface-variant flex items-center justify-center gap-2 ring-1 ring-outline-variant/30 transition-all hover:bg-surface-container-high" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="sms">sms</span>
                        OTP Option
                    </button>
</div>
<!-- CTA Button -->
<button class="w-full h-14 bg-gradient-to-r from-primary-container to-secondary-container text-white font-headline font-bold text-lg rounded-xxl shadow-lg shadow-primary-container/25 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200" type="submit">
                    Continue to Library
                </button>
</form>
<!-- Secondary Actions -->
<div class="mt-8 flex flex-col items-center gap-4 border-t border-outline-variant/10 pt-8">
<button class="text-sm font-medium text-primary hover:text-secondary-container transition-colors">
                    Forgot Password?
                </button>
<p class="text-sm text-on-surface-variant">
                    New scholar? <button class="font-bold text-on-surface hover:underline transition-all">Request Access</button>
</p>
</div>
</section>
<!-- Contextual Support Info -->
<footer class="mt-12 text-center">
<div class="inline-flex items-center gap-6 px-6 py-3 bg-surface-container-low rounded-full">
<div class="flex -space-x-2">
<img alt="" class="w-6 h-6 rounded-full ring-2 ring-surface" data-alt="profile portrait of a smiling young woman with dark hair in a bright office setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAm9n4QNz8aCY6jfJVDU_YMjWUuJTi_Gt5itxRq9ZT0vIiCccgvJNwV8A0dC9O09HGUuwUx0AQxXAIYGQdB8qMR4owNk9Ed3RayCklO7h3avJ-5H-mAKykSYeXG-lcIev1VLky3q2CyeT7eTGJoIOVP8gI786eXWOKU9aQzFLCHlUt3qxu9_31LfFM81mA-RiUY_S4qKRBbhhc1wfyS7VRqkIWDHE-r1oxKTu2jtnMqdq2vSg4zomNOl5Y8MNb683C_qsA4wVNfiTE"/>

<div class="absolute bottom-12 left-12 z-20 max-w-[280px]">
